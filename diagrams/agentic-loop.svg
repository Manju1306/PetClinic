<svg viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111;">
  <defs>
    <marker id="a4" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#888"/>
    </marker>
    <marker id="a4o" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#f97316"/>
    </marker>
    <marker id="a4g" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="390" y="28" fill="#eee" font-size="15" font-weight="700" text-anchor="middle">The Agentic Loop — Inside streamText()</text>
  <text x="390" y="48" fill="#aaa" font-size="10.5" text-anchor="middle">How the AI chains multiple tool calls to complete a task</text>

  <!-- User message -->
  <rect x="160" y="65" width="460" height="35" rx="8" fill="#1e1e1e" stroke="#333"/>
  <text x="180" y="87" fill="#eee" font-size="10.5" font-weight="600">"Book a visit for my cat next Monday for a checkup"</text>

  <line x1="390" y1="100" x2="390" y2="122" stroke="#888" stroke-width="1.2" marker-end="url(#a4)"/>

  <!-- Step 1: LLM Thinks -->
  <rect x="260" y="125" width="260" height="45" rx="8" fill="#3b82f622" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="280" y="145" fill="#3b82f6" font-size="10" font-weight="700">LLM THINKS</text>
  <text x="280" y="162" fill="#aaa" font-size="9.5">"I need to find the user's pets first"</text>

  <line x1="390" y1="170" x2="390" y2="192" stroke="#f97316" stroke-width="1.2" marker-end="url(#a4o)"/>
  <text x="400" y="186" fill="#f97316" font-size="8.5" font-weight="600">STEP 1</text>

  <!-- Tool call 1 -->
  <rect x="120" y="195" width="280" height="65" rx="8" fill="#1e1e1e" stroke="#f97316" stroke-width="1.5"/>
  <text x="140" y="218" fill="#f97316" font-size="11" font-weight="700">Tool Call: get_my_pets()</text>
  <text x="140" y="236" fill="#aaa" font-size="9">AI auto-generates this call</text>
  <text x="140" y="250" fill="#aaa" font-size="9">based on the user's question</text>

  <!-- DB result 1 -->
  <rect x="420" y="195" width="260" height="65" rx="8" fill="#2a2a2a" stroke="#333"/>
  <text x="440" y="218" fill="#eee" font-size="10" font-weight="600">Database Returns:</text>
  <text x="440" y="236" fill="#aaa" font-size="9.5">SELECT * FROM pets WHERE owner = 'manju'</text>
  <text x="440" y="252" fill="#16a34a" font-size="9.5" font-weight="600">→ cat "Whiskers" (id: 7)</text>

  <line x1="400" y1="228" x2="416" y2="228" stroke="#888" stroke-width="1" marker-end="url(#a4)"/>

  <!-- Result fed back -->
  <line x1="390" y1="260" x2="390" y2="282" stroke="#888" stroke-width="1.2" marker-end="url(#a4)"/>
  <text x="400" y="276" fill="#888" font-size="8">result fed back to LLM</text>

  <!-- Step 2: LLM Thinks again -->
  <rect x="260" y="285" width="260" height="45" rx="8" fill="#3b82f622" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="280" y="305" fill="#3b82f6" font-size="10" font-weight="700">LLM THINKS AGAIN</text>
  <text x="280" y="322" fill="#aaa" font-size="9.5">"Found the cat. Now I'll book the visit."</text>

  <line x1="390" y1="330" x2="390" y2="352" stroke="#f97316" stroke-width="1.2" marker-end="url(#a4o)"/>
  <text x="400" y="346" fill="#f97316" font-size="8.5" font-weight="600">STEP 2</text>

  <!-- Tool call 2 -->
  <rect x="120" y="355" width="280" height="65" rx="8" fill="#1e1e1e" stroke="#f97316" stroke-width="1.5"/>
  <text x="140" y="378" fill="#f97316" font-size="11" font-weight="700">Tool Call: add_visit()</text>
  <text x="140" y="396" fill="#aaa" font-size="9">petId: 7, date: "2026-06-23"</text>
  <text x="140" y="410" fill="#aaa" font-size="9">description: "checkup"</text>

  <!-- DB result 2 -->
  <rect x="420" y="355" width="260" height="65" rx="8" fill="#2a2a2a" stroke="#333"/>
  <text x="440" y="378" fill="#eee" font-size="10" font-weight="600">Database Executes:</text>
  <text x="440" y="396" fill="#aaa" font-size="9.5">INSERT INTO visits (pet_id, date, desc)</text>
  <text x="440" y="412" fill="#16a34a" font-size="9.5" font-weight="600">→ Visit created (id: 42)</text>

  <line x1="400" y1="388" x2="416" y2="388" stroke="#888" stroke-width="1" marker-end="url(#a4)"/>

  <!-- Final response -->
  <line x1="390" y1="420" x2="390" y2="450" stroke="#16a34a" stroke-width="1.2" marker-end="url(#a4g)"/>

  <rect x="120" y="453" width="540" height="50" rx="10" fill="#1e1e1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="145" y="476" fill="#16a34a" font-size="11" font-weight="700">AI Writes Final Answer (streamed word by word):</text>
  <text x="145" y="495" fill="#eee" font-size="10.5">"Visit booked for Whiskers on June 23, 2026 for a checkup!"</text>

  <!-- Config note -->
  <rect x="40" y="70" width="110" height="55" rx="6" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="52" y="90" fill="#8b5cf6" font-size="8.5" font-weight="600">streamText()</text>
  <text x="52" y="105" fill="#aaa" font-size="8">maxSteps: 5</text>
  <text x="52" y="118" fill="#aaa" font-size="8">maxRetries: 1</text>

  <rect x="630" y="70" width="110" height="55" rx="6" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="642" y="90" fill="#8b5cf6" font-size="8.5" font-weight="600">This example</text>
  <text x="642" y="105" fill="#aaa" font-size="8">2 steps used</text>
  <text x="642" y="118" fill="#aaa" font-size="8">3 steps left</text>
</svg>