<svg viewBox="0 0 780 350" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111;">
  <defs>
    <marker id="a3" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#888"/>
    </marker>
  </defs>

  <text x="390" y="30" fill="#eee" font-size="15" font-weight="700" text-anchor="middle">One Interface, Many Providers</text>
  <text x="390" y="50" fill="#aaa" font-size="10.5" text-anchor="middle">Vercel AI SDK abstracts away provider differences — write once, swap anytime</text>

  <!-- Your code box -->
  <rect x="250" y="70" width="280" height="70" rx="10" fill="#3b82f622" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="95" fill="#3b82f6" font-size="11" font-weight="700">YOUR CODE</text>
  <text x="275" y="115" fill="#eee" font-size="10" font-weight="600">streamText({ model, tools, messages })</text>
  <text x="310" y="130" fill="#aaa" font-size="9">Same function for ALL providers</text>

  <!-- Arrow down -->
  <line x1="390" y1="140" x2="390" y2="168" stroke="#888" stroke-width="1.2" marker-end="url(#a3)"/>

  <!-- SDK box -->
  <rect x="200" y="170" width="380" height="40" rx="8" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="310" y="195" fill="#8b5cf6" font-size="11" font-weight="700">VERCEL AI SDK v6</text>
  <text x="430" y="195" fill="#aaa" font-size="9">npm: "ai"</text>

  <!-- Three arrows down -->
  <line x1="180" y1="210" x2="180" y2="245" stroke="#888" stroke-width="1.2" marker-end="url(#a3)"/>
  <line x1="390" y1="210" x2="390" y2="245" stroke="#888" stroke-width="1.2" marker-end="url(#a3)"/>
  <line x1="600" y1="210" x2="600" y2="245" stroke="#888" stroke-width="1.2" marker-end="url(#a3)"/>

  <!-- Google -->
  <rect x="80" y="248" width="200" height="85" rx="10" fill="#1e1e1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="120" y="274" fill="#16a34a" font-size="12" font-weight="700">Google Gemini</text>
  <text x="100" y="296" fill="#aaa" font-size="9.5">Model: gemini-2.5-flash</text>
  <text x="100" y="312" fill="#aaa" font-size="9.5">Free tier: 500 req/day</text>
  <rect x="100" y="318" width="95" height="14" rx="3" fill="#16a34a33" stroke="#16a34a" stroke-width="0.5"/>
  <text x="108" y="328" fill="#16a34a" font-size="8" font-weight="600">Best for: Dev</text>

  <!-- OpenAI -->
  <rect x="290" y="248" width="200" height="85" rx="10" fill="#1e1e1e" stroke="#eee" stroke-width="1"/>
  <text x="340" y="274" fill="#eee" font-size="12" font-weight="700">OpenAI</text>
  <text x="310" y="296" fill="#aaa" font-size="9.5">Model: gpt-4o</text>
  <text x="310" y="312" fill="#aaa" font-size="9.5">Pay per token</text>
  <rect x="310" y="318" width="115" height="14" rx="3" fill="#3b82f633" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="318" y="328" fill="#3b82f6" font-size="8" font-weight="600">Best for: Production</text>

  <!-- Anthropic -->
  <rect x="500" y="248" width="200" height="85" rx="10" fill="#1e1e1e" stroke="#f97316" stroke-width="1"/>
  <text x="540" y="274" fill="#f97316" font-size="12" font-weight="700">Anthropic</text>
  <text x="520" y="296" fill="#aaa" font-size="9.5">Model: claude-sonnet-4</text>
  <text x="520" y="312" fill="#aaa" font-size="9.5">Pay per token</text>
  <rect x="520" y="318" width="120" height="14" rx="3" fill="#f9731633" stroke="#f97316" stroke-width="0.5"/>
  <text x="528" y="328" fill="#f97316" font-size="8" font-weight="600">Best for: Reasoning</text>
</svg>