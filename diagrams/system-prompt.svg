<svg viewBox="0 0 780 380" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111;">
  <defs>
    <marker id="a8" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#888"/>
    </marker>
  </defs>

  <text x="390" y="28" fill="#eee" font-size="15" font-weight="700" text-anchor="middle">The System Prompt — Shaping AI Behavior</text>
  <text x="390" y="48" fill="#aaa" font-size="10.5" text-anchor="middle">Invisible instructions the user never sees — like onboarding a new employee</text>

  <!-- Prompt structure -->
  <rect x="40" y="68" width="430" height="295" rx="12" fill="#1e1e1e" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="40" y="68" width="430" height="26" rx="12" fill="#3b82f6"/>
  <rect x="40" y="82" width="430" height="12" fill="#3b82f6"/>
  <text x="180" y="86" fill="white" font-size="11" font-weight="700">SYSTEM PROMPT</text>

  <!-- Identity -->
  <rect x="58" y="100" width="395" height="36" rx="6" fill="#8b5cf622" stroke="#8b5cf6" stroke-width="1"/>
  <text x="74" y="116" fill="#8b5cf6" font-size="9.5" font-weight="700">IDENTITY</text>
  <text x="145" y="116" fill="#aaa" font-size="9">"You are a friendly AI assistant for Spring PetClinic"</text>
  <text x="74" y="130" fill="#666" font-size="8.5">Defines who the AI is and its tone</text>

  <!-- Capabilities -->
  <rect x="58" y="144" width="395" height="50" rx="6" fill="#16a34a22" stroke="#16a34a" stroke-width="1"/>
  <text x="74" y="160" fill="#16a34a" font-size="9.5" font-weight="700">CAPABILITIES</text>
  <text x="170" y="160" fill="#aaa" font-size="9">"You help pet owners with:"</text>
  <text x="74" y="176" fill="#aaa" font-size="9">1. Find vets  2. Book visits  3. Check history  4. Pet care advice</text>
  <text x="74" y="188" fill="#666" font-size="8.5">Tells the AI what it CAN do</text>

  <!-- Tool instructions -->
  <rect x="58" y="202" width="395" height="50" rx="6" fill="#f9731622" stroke="#f97316" stroke-width="1"/>
  <text x="74" y="218" fill="#f97316" font-size="9.5" font-weight="700">TOOL USAGE RULES</text>
  <text x="74" y="236" fill="#aaa" font-size="9">"First call get_my_pets, ask which pet, confirm before booking"</text>
  <text x="74" y="248" fill="#666" font-size="8.5">Step-by-step instructions for multi-step tasks</text>

  <!-- RAG instruction -->
  <rect x="58" y="260" width="395" height="36" rx="6" fill="#06b6d422" stroke="#06b6d4" stroke-width="1"/>
  <text x="74" y="276" fill="#06b6d4" font-size="9.5" font-weight="700">RAG INSTRUCTION</text>
  <text x="200" y="276" fill="#aaa" font-size="9">"Use search_knowledge for pet care + clinic info"</text>
  <text x="74" y="290" fill="#666" font-size="8.5">Tells the AI to check the knowledge base first</text>

  <!-- Guardrails -->
  <rect x="58" y="304" width="395" height="42" rx="6" fill="#ef444422" stroke="#ef4444" stroke-width="1"/>
  <text x="74" y="320" fill="#ef4444" font-size="9.5" font-weight="700">GUARDRAILS</text>
  <text x="160" y="320" fill="#aaa" font-size="9">"Never make up information. Use the database."</text>
  <text x="74" y="336" fill="#aaa" font-size="9">"Keep responses concise — pet owners are busy people."</text>

  <!-- Right side: what the user sees -->
  <rect x="500" y="68" width="240" height="145" rx="10" fill="#1e1e1e" stroke="#333"/>
  <text x="520" y="92" fill="#eee" font-size="10" font-weight="700">What the USER sees:</text>

  <rect x="518" y="105" width="205" height="30" rx="6" fill="#2a2a2a" stroke="#333"/>
  <text x="530" y="124" fill="#aaa" font-size="9.5">"Which vet for dental issues?"</text>

  <rect x="518" y="145" width="205" height="50" rx="6" fill="#16a34a11" stroke="#16a34a" stroke-width="0.8"/>
  <text x="530" y="164" fill="#16a34a" font-size="9.5" font-weight="600">Dr. Linda Douglas</text>
  <text x="530" y="180" fill="#aaa" font-size="9">specializes in dentistry</text>

  <text x="520" y="208" fill="#666" font-size="8.5" font-style="italic">User never sees the system prompt</text>

  <!-- What the AI sees -->
  <rect x="500" y="228" width="240" height="135" rx="10" fill="#1e1e1e" stroke="#3b82f6" stroke-width="1"/>
  <text x="520" y="252" fill="#3b82f6" font-size="10" font-weight="700">What the AI receives:</text>

  <rect x="518" y="265" width="205" height="22" rx="4" fill="#3b82f622" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="530" y="280" fill="#3b82f6" font-size="8.5">1. System prompt (hidden rules)</text>

  <rect x="518" y="293" width="205" height="22" rx="4" fill="#2a2a2a" stroke="#333"/>
  <text x="530" y="308" fill="#aaa" font-size="8.5">2. Conversation history</text>

  <rect x="518" y="321" width="205" height="22" rx="4" fill="#f9731622" stroke="#f97316" stroke-width="0.5"/>
  <text x="530" y="336" fill="#f97316" font-size="8.5">3. Tool definitions (7 tools)</text>

  <text x="520" y="360" fill="#666" font-size="8.5">All three shape the AI's behavior</text>
</svg>