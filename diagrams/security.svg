<svg viewBox="0 0 780 440" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111;">
  <defs>
    <marker id="a9" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#888"/>
    </marker>
  </defs>

  <text x="390" y="28" fill="#eee" font-size="15" font-weight="700" text-anchor="middle">Security — Doing It Right</text>
  <text x="390" y="48" fill="#aaa" font-size="10.5" text-anchor="middle">Security in code, not prompts — three layers of protection</text>

  <!-- Layer 1: JWT Auth -->
  <rect x="40" y="68" width="700" height="85" rx="10" fill="#1e1e1e" stroke="#eab308" stroke-width="1.5"/>
  <text x="60" y="92" fill="#eab308" font-size="12" font-weight="700">LAYER 1 — JWT Authentication</text>

  <rect x="60" y="105" width="140" height="35" rx="6" fill="#2a2a2a" stroke="#333"/>
  <text x="78" y="126" fill="#aaa" font-size="9.5">Browser sends JWT</text>

  <line x1="200" y1="122" x2="222" y2="122" stroke="#888" stroke-width="1" marker-end="url(#a9)"/>

  <rect x="226" y="105" width="160" height="35" rx="6" fill="#eab30822" stroke="#eab308" stroke-width="1"/>
  <text x="244" y="126" fill="#eab308" font-size="9.5" font-weight="600">requireAuth validates</text>

  <line x1="386" y1="122" x2="408" y2="122" stroke="#888" stroke-width="1" marker-end="url(#a9)"/>

  <rect x="412" y="105" width="155" height="35" rx="6" fill="#2a2a2a" stroke="#333"/>
  <text x="425" y="120" fill="#eee" font-size="9">username: "manju"</text>
  <text x="425" y="134" fill="#eee" font-size="9">roles: ["ROLE_USER"]</text>

  <line x1="567" y1="122" x2="589" y2="122" stroke="#888" stroke-width="1" marker-end="url(#a9)"/>

  <rect x="593" y="105" width="130" height="35" rx="6" fill="#16a34a22" stroke="#16a34a" stroke-width="1"/>
  <text x="610" y="126" fill="#16a34a" font-size="9.5" font-weight="600">Passed to tools</text>

  <!-- Layer 2: Tool-level -->
  <rect x="40" y="168" width="700" height="130" rx="10" fill="#1e1e1e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="60" y="192" fill="#ef4444" font-size="12" font-weight="700">LAYER 2 — Tool-Level Access Control (the important one)</text>

  <!-- Wrong way -->
  <rect x="60" y="205" width="310" height="78" rx="8" fill="#ef444411" stroke="#ef4444" stroke-width="1"/>
  <text x="78" y="225" fill="#ef4444" font-size="10" font-weight="700">WRONG — Prompt-based security</text>
  <text x="78" y="245" fill="#aaa" font-size="9">"Don't show other users' data"</text>
  <text x="78" y="262" fill="#ef4444" font-size="9">AI can IGNORE prompt instructions</text>
  <text x="78" y="276" fill="#ef4444" font-size="9">Prompt injection can bypass this</text>

  <!-- Right way -->
  <rect x="390" y="205" width="330" height="78" rx="8" fill="#16a34a11" stroke="#16a34a" stroke-width="1.2"/>
  <text x="408" y="225" fill="#16a34a" font-size="10" font-weight="700">RIGHT — Code-based security</text>
  <text x="408" y="245" fill="#eee" font-size="9" font-weight="600">WHERE owner.username = 'manju'</text>
  <text x="408" y="262" fill="#16a34a" font-size="9">Database filters BEFORE data reaches AI</text>
  <text x="408" y="276" fill="#16a34a" font-size="9">No prompt injection can bypass code</text>

  <!-- Layer 3: Gateway admin -->
  <rect x="40" y="313" width="700" height="110" rx="10" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="60" y="337" fill="#8b5cf6" font-size="12" font-weight="700">LAYER 3 — Role-Based API Access</text>

  <!-- Regular user -->
  <rect x="60" y="352" width="200" height="55" rx="8" fill="#2a2a2a" stroke="#333"/>
  <text x="78" y="372" fill="#16a34a" font-size="10" font-weight="700">ROLE_USER</text>
  <text x="78" y="390" fill="#aaa" font-size="9">Can: chat, see own pets</text>
  <text x="78" y="402" fill="#ef4444" font-size="9">Cannot: gateway API, all owners</text>

  <!-- Admin -->
  <rect x="280" y="352" width="200" height="55" rx="8" fill="#2a2a2a" stroke="#eab308" stroke-width="1"/>
  <text x="298" y="372" fill="#eab308" font-size="10" font-weight="700">ROLE_ADMIN</text>
  <text x="298" y="390" fill="#aaa" font-size="9">Can: everything + gateway API</text>
  <text x="298" y="402" fill="#aaa" font-size="9">Can: see all owners' pets</text>

  <!-- How it works in tools -->
  <rect x="500" y="352" width="220" height="55" rx="8" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="518" y="372" fill="#8b5cf6" font-size="10" font-weight="700">IN CODE</text>
  <text x="518" y="390" fill="#eee" font-size="9">if (isAdmin) → findAll()</text>
  <text x="518" y="402" fill="#eee" font-size="9">else → findOne({ username })</text>
</svg>