<svg viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111;">
  <defs>
    <marker id="a5" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#888"/>
    </marker>
    <marker id="a5c" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#06b6d4"/>
    </marker>
  </defs>

  <text x="390" y="28" fill="#eee" font-size="15" font-weight="700" text-anchor="middle">RAG — Retrieval-Augmented Generation</text>
  <text x="390" y="48" fill="#aaa" font-size="10.5" text-anchor="middle">Search for relevant knowledge, feed it to the AI — instead of guessing from training data</text>

  <!-- Without RAG vs With RAG -->
  <rect x="40" y="65" width="340" height="85" rx="10" fill="#1e1e1e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="60" y="88" fill="#ef4444" font-size="11" font-weight="700">WITHOUT RAG</text>
  <text x="60" y="108" fill="#aaa" font-size="9.5">"What vaccinations does my puppy need?"</text>
  <text x="60" y="126" fill="#ef4444" font-size="9.5">AI guesses from training data</text>
  <text x="60" y="142" fill="#666" font-size="8.5" font-style="italic">May be wrong, outdated, not clinic-specific</text>

  <rect x="400" y="65" width="340" height="85" rx="10" fill="#1e1e1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="420" y="88" fill="#16a34a" font-size="11" font-weight="700">WITH RAG</text>
  <text x="420" y="108" fill="#aaa" font-size="9.5">"What vaccinations does my puppy need?"</text>
  <text x="420" y="126" fill="#16a34a" font-size="9.5">AI reads your knowledge base article</text>
  <text x="420" y="142" fill="#666" font-size="8.5" font-style="italic">Accurate, specific to your clinic</text>

  <!-- How Embeddings Work -->
  <text x="390" y="178" fill="#eee" font-size="12" font-weight="700" text-anchor="middle">How Embeddings Work — Text → Numbers → Similarity</text>

  <rect x="40" y="195" width="700" height="100" rx="10" fill="#1e1e1e" stroke="#06b6d4" stroke-width="1.2"/>

  <text x="60" y="220" fill="#06b6d4" font-size="10" font-weight="700">Text gets converted to numbers that capture meaning:</text>

  <rect x="60" y="232" width="310" height="22" rx="4" fill="#2a2a2a" stroke="#333"/>
  <text x="72" y="247" fill="#eee" font-size="9">"puppy vaccinations"</text>
  <text x="210" y="247" fill="#06b6d4" font-size="9">→ [0.82, -0.15, 0.43, ...]</text>

  <rect x="60" y="258" width="310" height="22" rx="4" fill="#2a2a2a" stroke="#333"/>
  <text x="72" y="273" fill="#eee" font-size="9">"dog vaccine schedule"</text>
  <text x="210" y="273" fill="#06b6d4" font-size="9">→ [0.79, -0.18, 0.41, ...]</text>

  <rect x="60" y="284" width="310" height="4" rx="2" fill="transparent"/>

  <rect x="400" y="232" width="320" height="22" rx="4" fill="#16a34a22" stroke="#16a34a" stroke-width="0.8"/>
  <text x="412" y="247" fill="#16a34a" font-size="9" font-weight="600">Similar meaning = similar numbers = HIGH score</text>

  <rect x="400" y="258" width="320" height="22" rx="4" fill="#2a2a2a" stroke="#333"/>
  <text x="412" y="273" fill="#eee" font-size="9">"clinic pricing"</text>
  <text x="510" y="273" fill="#888" font-size="9">→ [0.11, 0.56, -0.33, ...]</text>

  <rect x="400" y="284" width="320" height="4" rx="2" fill="transparent"/>

  <!-- The RAG Pipeline -->
  <text x="390" y="325" fill="#eee" font-size="12" font-weight="700" text-anchor="middle">The RAG Pipeline — What Happens at Runtime</text>

  <!-- Startup -->
  <rect x="40" y="342" width="220" height="55" rx="8" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="58" y="362" fill="#8b5cf6" font-size="10" font-weight="700">SERVER STARTUP (once)</text>
  <text x="58" y="380" fill="#aaa" font-size="9">Embed all 14 articles</text>
  <text x="58" y="392" fill="#aaa" font-size="9">Store embeddings in memory</text>

  <line x1="260" y1="370" x2="280" y2="370" stroke="#888" stroke-width="1" marker-end="url(#a5)"/>

  <!-- Step 1: User asks -->
  <rect x="284" y="342" width="220" height="55" rx="8" fill="#1e1e1e" stroke="#333"/>
  <text x="302" y="362" fill="#eee" font-size="10" font-weight="600">User asks:</text>
  <text x="302" y="380" fill="#aaa" font-size="9.5">"How much does a dental</text>
  <text x="302" y="392" fill="#aaa" font-size="9.5">cleaning cost?"</text>

  <line x1="504" y1="370" x2="524" y2="370" stroke="#888" stroke-width="1" marker-end="url(#a5)"/>

  <!-- Step 2: AI calls tool -->
  <rect x="528" y="342" width="220" height="55" rx="8" fill="#1e1e1e" stroke="#f97316" stroke-width="1.2"/>
  <text x="546" y="362" fill="#f97316" font-size="10" font-weight="700">AI calls search_knowledge</text>
  <text x="546" y="380" fill="#aaa" font-size="9">query: "dental cleaning cost"</text>
  <text x="546" y="392" fill="#aaa" font-size="9">category: "clinic"</text>

  <!-- Arrow down -->
  <line x1="638" y1="397" x2="638" y2="420" stroke="#06b6d4" stroke-width="1.2" marker-end="url(#a5c)"/>

  <!-- Step 3: Embed + Search -->
  <rect x="40" y="423" width="360" height="60" rx="8" fill="#06b6d411" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="58" y="446" fill="#06b6d4" font-size="10" font-weight="700">RAG ENGINE</text>
  <text x="58" y="464" fill="#aaa" font-size="9">1. Embed query → [0.23, -0.56, ...]</text>
  <text x="58" y="478" fill="#aaa" font-size="9">2. Compare against 14 article embeddings (cosine similarity)</text>

  <line x1="400" y1="453" x2="420" y2="453" stroke="#06b6d4" stroke-width="1.2" marker-end="url(#a5c)"/>

  <!-- Step 4: Top matches -->
  <rect x="424" y="423" width="316" height="60" rx="8" fill="#1e1e1e" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="442" y="446" fill="#06b6d4" font-size="10" font-weight="700">TOP MATCHES</text>
  <text x="442" y="464" fill="#16a34a" font-size="9.5">"Pricing Guide" — 87% match</text>
  <text x="442" y="478" fill="#aaa" font-size="9.5">"Pet Dental Care Guide" — 72% match</text>

  <!-- Final answer -->
  <line x1="390" y1="483" x2="390" y2="508" stroke="#16a34a" stroke-width="1.2" marker-end="url(#a5c)"/>

  <rect x="80" y="510" width="620" height="38" rx="8" fill="#1e1e1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="105" y="530" fill="#16a34a" font-size="10" font-weight="700">AI ANSWERS:</text>
  <text x="215" y="530" fill="#eee" font-size="10">"Dental cleaning costs $250-$450, includes anesthesia and blood work."</text>
  <text x="105" y="543" fill="#666" font-size="8.5">From YOUR knowledge base — not hallucinated from training data</text>
</svg>