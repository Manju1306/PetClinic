<svg viewBox="0 0 780 920" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#888"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- LAYER 1: FRONTEND -->
  <rect x="40" y="20" width="700" height="120" rx="12" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="48" fill="#16a34a" font-size="11" font-weight="700" letter-spacing="1.5">FRONTEND</text>
  <text x="170" y="48" fill="#888" font-size="10">React 19 + Tailwind CSS v4</text>

  <rect x="60" y="62" width="140" height="60" rx="8" fill="#2a2a2a" stroke="#333"/>
  <text x="82" y="82" fill="#eee" font-size="11" font-weight="600">User</text>
  <text x="82" y="100" fill="#aaa" font-size="9.5">"What vaccines does</text>
  <text x="82" y="112" fill="#aaa" font-size="9.5">my puppy need?"</text>

  <rect x="260" y="62" width="180" height="60" rx="8" fill="#2a2a2a" stroke="#333"/>
  <text x="280" y="82" fill="#eee" font-size="11" font-weight="600">ChatWidget.tsx</text>
  <text x="280" y="98" fill="#aaa" font-size="9.5">apiFetch + JWT token</text>
  <text x="280" y="110" fill="#aaa" font-size="9.5">ReadableStream display</text>

  <rect x="500" y="62" width="220" height="60" rx="8" fill="#2a2a2a" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="520" y="82" fill="#16a34a" font-size="11" font-weight="600">Streaming Response</text>
  <text x="520" y="98" fill="#aaa" font-size="9.5">Word by word, real-time</text>
  <text x="520" y="110" fill="#aaa" font-size="9.5">res.write(chunk) → UI</text>

  <line x1="200" y1="92" x2="256" y2="92" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="440" y1="92" x2="496" y2="92" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrow-accent)"/>

  <!-- Connection Frontend → Backend -->
  <line x1="350" y1="140" x2="350" y2="175" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="360" y="163" fill="#888" font-size="9">POST /api/chat</text>

  <!-- LAYER 2: AUTH -->
  <rect x="40" y="178" width="700" height="55" rx="12" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
  <text x="60" y="200" fill="#eab308" font-size="11" font-weight="700" letter-spacing="1.5">AUTH LAYER</text>

  <rect x="240" y="190" width="180" height="30" rx="6" fill="#2a2a2a" stroke="#eab308" stroke-width="1"/>
  <text x="260" y="210" fill="#eab308" font-size="10" font-weight="600">requireAuth</text>
  <text x="362" y="210" fill="#aaa" font-size="9">→ JWT verify</text>

  <rect x="460" y="190" width="260" height="30" rx="6" fill="#2a2a2a" stroke="#333"/>
  <text x="480" y="210" fill="#aaa" font-size="9.5">Extracts: username="manju", roles=["ROLE_USER"]</text>

  <line x1="350" y1="233" x2="350" y2="268" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LAYER 3: LLM GATEWAY -->
  <rect x="40" y="270" width="700" height="110" rx="12" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="60" y="296" fill="#8b5cf6" font-size="11" font-weight="700" letter-spacing="1.5">LLM GATEWAY</text>
  <text x="195" y="296" fill="#888" font-size="10">gateway.ts — Provider routing + monitoring</text>

  <rect x="60" y="308" width="130" height="55" rx="8" fill="#16a34a22" stroke="#16a34a" stroke-width="1.2"/>
  <text x="80" y="328" fill="#16a34a" font-size="10.5" font-weight="700">Google Gemini</text>
  <text x="80" y="344" fill="#aaa" font-size="9">gemini-2.5-flash</text>
  <text x="80" y="356" fill="#16a34a" font-size="8.5" font-weight="600">PRIMARY</text>

  <rect x="210" y="308" width="130" height="55" rx="8" fill="#2a2a2a" stroke="#333"/>
  <text x="230" y="328" fill="#ddd" font-size="10.5" font-weight="600">OpenAI</text>
  <text x="230" y="344" fill="#aaa" font-size="9">gpt-4o</text>
  <text x="230" y="356" fill="#888" font-size="8.5">FALLBACK 1</text>

  <rect x="360" y="308" width="130" height="55" rx="8" fill="#2a2a2a" stroke="#333"/>
  <text x="380" y="328" fill="#ddd" font-size="10.5" font-weight="600">Anthropic</text>
  <text x="380" y="344" fill="#aaa" font-size="9">claude-sonnet-4</text>
  <text x="380" y="356" fill="#888" font-size="8.5">FALLBACK 2</text>

  <rect x="530" y="308" width="190" height="55" rx="8" fill="#2a2a2a" stroke="#8b5cf6" stroke-width="1"/>
  <text x="550" y="328" fill="#8b5cf6" font-size="10.5" font-weight="600">Usage Logging</text>
  <text x="550" y="344" fill="#aaa" font-size="9">Latency, success/fail</text>
  <text x="550" y="356" fill="#aaa" font-size="9">Admin: GET /api/gateway/stats</text>

  <line x1="350" y1="380" x2="350" y2="415" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="360" y="403" fill="#888" font-size="9">selected model</text>

  <!-- LAYER 4: AI SERVICE -->
  <rect x="40" y="418" width="700" height="85" rx="12" fill="#1e1e1e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="444" fill="#3b82f6" font-size="11" font-weight="700" letter-spacing="1.5">AI SERVICE</text>
  <text x="170" y="444" fill="#888" font-size="10">service.ts — Vercel AI SDK v6</text>

  <rect x="60" y="456" width="150" height="34" rx="6" fill="#2a2a2a" stroke="#333"/>
  <text x="78" y="477" fill="#ddd" font-size="10">System Prompt</text>

  <rect x="230" y="456" width="150" height="34" rx="6" fill="#3b82f622" stroke="#3b82f6" stroke-width="1"/>
  <text x="252" y="477" fill="#3b82f6" font-size="10" font-weight="600">streamText()</text>

  <rect x="400" y="456" width="150" height="34" rx="6" fill="#2a2a2a" stroke="#333"/>
  <text x="418" y="477" fill="#ddd" font-size="10">stepCountIs(5)</text>

  <rect x="570" y="456" width="150" height="34" rx="6" fill="#2a2a2a" stroke="#333"/>
  <text x="588" y="477" fill="#ddd" font-size="10">convertMessages</text>

  <!-- Arrows to Tools split -->
  <text x="300" y="525" fill="#888" font-size="9.5" font-style="italic">AI decides which tools to call</text>
  <line x1="240" y1="503" x2="240" y2="555" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="540" y1="503" x2="540" y2="555" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LAYER 5: TOOLS + RAG -->
  <!-- MCP Tools -->
  <rect x="40" y="558" width="380" height="195" rx="12" fill="#1e1e1e" stroke="#f97316" stroke-width="1.5"/>
  <text x="60" y="584" fill="#f97316" font-size="11" font-weight="700" letter-spacing="1.5">MCP TOOLS</text>
  <text x="165" y="584" fill="#888" font-size="10">tools.ts — Database access</text>

  <rect x="60" y="596" width="165" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="75" y="614" fill="#f97316" font-size="9.5" font-weight="600">search_vets</text>
  <text x="155" y="614" fill="#aaa" font-size="8.5">Find vets</text>

  <rect x="235" y="596" width="165" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="250" y="614" fill="#f97316" font-size="9.5" font-weight="600">get_my_pets</text>
  <text x="338" y="614" fill="#aaa" font-size="8.5">User pets</text>

  <rect x="60" y="632" width="165" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="75" y="650" fill="#f97316" font-size="9.5" font-weight="600">add_visit</text>
  <text x="145" y="650" fill="#aaa" font-size="8.5">Book visit</text>

  <rect x="235" y="632" width="165" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="250" y="650" fill="#f97316" font-size="9.5" font-weight="600">get_pet_visits</text>
  <text x="350" y="650" fill="#aaa" font-size="8.5">History</text>

  <rect x="60" y="668" width="165" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="75" y="686" fill="#f97316" font-size="9.5" font-weight="600">list_specialties</text>
  <text x="175" y="686" fill="#aaa" font-size="8.5">Specs</text>

  <rect x="235" y="668" width="165" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="250" y="686" fill="#f97316" font-size="9.5" font-weight="600">list_pet_types</text>
  <text x="352" y="686" fill="#aaa" font-size="8.5">Types</text>

  <rect x="60" y="710" width="345" height="28" rx="5" fill="#eab30811" stroke="#eab308" stroke-width="0.8"/>
  <text x="78" y="728" fill="#eab308" font-size="9">Security in code, not prompts — scoped by username + roles</text>

  <!-- RAG Engine -->
  <rect x="440" y="558" width="300" height="195" rx="12" fill="#1e1e1e" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="460" y="584" fill="#06b6d4" font-size="11" font-weight="700" letter-spacing="1.5">RAG ENGINE</text>
  <text x="560" y="584" fill="#888" font-size="10">rag.ts + articles.ts</text>

  <rect x="460" y="596" width="260" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="478" y="614" fill="#06b6d4" font-size="9.5" font-weight="600">search_knowledge</text>
  <text x="590" y="614" fill="#aaa" font-size="8.5">Similarity search</text>

  <rect x="460" y="634" width="260" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="478" y="652" fill="#aaa" font-size="9">1. Embed query → [0.82, -0.15, ...]</text>

  <rect x="460" y="670" width="260" height="28" rx="5" fill="#2a2a2a" stroke="#333"/>
  <text x="478" y="688" fill="#aaa" font-size="9">2. Cosine similarity vs 14 articles</text>

  <rect x="460" y="706" width="260" height="28" rx="5" fill="#06b6d422" stroke="#06b6d4" stroke-width="1"/>
  <text x="478" y="724" fill="#06b6d4" font-size="9">3. Return top 3 matches → AI answer</text>

  <!-- Arrows to DB -->
  <line x1="230" y1="753" x2="230" y2="790" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="590" y1="753" x2="590" y2="790" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- LAYER 6: DATA -->
  <rect x="70" y="793" width="320" height="55" rx="10" fill="#1e1e1e" stroke="#f97316" stroke-width="1.2"/>
  <text x="95" y="816" fill="#f97316" font-size="11" font-weight="700">SQLite + Sequelize</text>
  <text x="95" y="836" fill="#aaa" font-size="9.5">owners, pets, vets, visits, specialties</text>

  <rect x="440" y="793" width="300" height="55" rx="10" fill="#1e1e1e" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="465" y="816" fill="#06b6d4" font-size="11" font-weight="700">Knowledge Base</text>
  <text x="465" y="836" fill="#aaa" font-size="9.5">14 articles: vaccines, nutrition, pricing...</text>

  <!-- LEGEND -->
  <rect x="40" y="870" width="700" height="38" rx="8" fill="#1e1e1e" stroke="#333" stroke-width="0.8"/>
  <circle cx="70" cy="889" r="5" fill="#16a34a"/>  <text x="82" y="893" fill="#aaa" font-size="9">Frontend</text>
  <circle cx="155" cy="889" r="5" fill="#eab308"/>  <text x="167" y="893" fill="#aaa" font-size="9">Auth</text>
  <circle cx="215" cy="889" r="5" fill="#8b5cf6"/>  <text x="227" y="893" fill="#aaa" font-size="9">Gateway</text>
  <circle cx="300" cy="889" r="5" fill="#3b82f6"/>  <text x="312" y="893" fill="#aaa" font-size="9">AI Service</text>
  <circle cx="395" cy="889" r="5" fill="#f97316"/>  <text x="407" y="893" fill="#aaa" font-size="9">MCP Tools</text>
  <circle cx="490" cy="889" r="5" fill="#06b6d4"/>  <text x="502" y="893" fill="#aaa" font-size="9">RAG</text>
  <rect x="550" y="884" width="16" height="10" rx="2" fill="none" stroke="#16a34a" stroke-dasharray="3,2"/>
  <text x="572" y="893" fill="#aaa" font-size="9">Streaming</text>
</svg>