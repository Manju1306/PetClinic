<svg viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111;">
  <defs>
    <marker id="a2" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#888"/>
    </marker>
    <marker id="a2g" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#16a34a"/>
    </marker>
  </defs>

  <text x="390" y="30" fill="#eee" font-size="15" font-weight="700" text-anchor="middle">What Makes It "Agentic"?</text>
  <text x="390" y="50" fill="#aaa" font-size="10.5" text-anchor="middle">A regular chatbot generates text. An agentic AI takes actions.</text>

  <!-- Observe → Reason → Act → Respond loop -->
  <rect x="140" y="70" width="500" height="80" rx="10" fill="#1e1e1e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="92" fill="#3b82f6" font-size="11" font-weight="700" text-anchor="middle">The Agentic Loop</text>

  <rect x="160" y="105" width="95" height="32" rx="6" fill="#8b5cf622" stroke="#8b5cf6" stroke-width="1"/>
  <text x="182" y="125" fill="#8b5cf6" font-size="10" font-weight="700">OBSERVE</text>

  <line x1="255" y1="121" x2="275" y2="121" stroke="#888" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="279" y="105" width="95" height="32" rx="6" fill="#3b82f622" stroke="#3b82f6" stroke-width="1"/>
  <text x="301" y="125" fill="#3b82f6" font-size="10" font-weight="700">REASON</text>

  <line x1="374" y1="121" x2="394" y2="121" stroke="#888" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="398" y="105" width="95" height="32" rx="6" fill="#f9731622" stroke="#f97316" stroke-width="1"/>
  <text x="430" y="125" fill="#f97316" font-size="10" font-weight="700">ACT</text>

  <line x1="493" y1="121" x2="513" y2="121" stroke="#888" stroke-width="1.2" marker-end="url(#a2)"/>

  <rect x="517" y="105" width="105" height="32" rx="6" fill="#16a34a22" stroke="#16a34a" stroke-width="1"/>
  <text x="537" y="125" fill="#16a34a" font-size="10" font-weight="700">RESPOND</text>

  <!-- Multi-step example -->
  <text x="390" y="180" fill="#eee" font-size="12" font-weight="700" text-anchor="middle">Multi-Step Example — "Book a visit for my cat"</text>

  <!-- Step 1 -->
  <rect x="40" y="200" width="90" height="50" rx="8" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="55" y="220" fill="#8b5cf6" font-size="9" font-weight="700">OBSERVE</text>
  <text x="50" y="240" fill="#aaa" font-size="8">Read question</text>

  <line x1="130" y1="225" x2="148" y2="225" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>

  <rect x="152" y="200" width="115" height="50" rx="8" fill="#1e1e1e" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="167" y="220" fill="#3b82f6" font-size="9" font-weight="700">REASON</text>
  <text x="160" y="240" fill="#aaa" font-size="8">"Need user's pets"</text>

  <line x1="267" y1="225" x2="285" y2="225" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>

  <rect x="289" y="200" width="145" height="50" rx="8" fill="#1e1e1e" stroke="#f97316" stroke-width="1.2"/>
  <text x="304" y="220" fill="#f97316" font-size="9" font-weight="700">ACT — Tool Call 1</text>
  <text x="297" y="240" fill="#f97316" font-size="8.5">get_my_pets()</text>

  <line x1="434" y1="225" x2="452" y2="225" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>

  <rect x="456" y="200" width="130" height="50" rx="8" fill="#2a2a2a" stroke="#333"/>
  <text x="474" y="218" fill="#aaa" font-size="8.5">DB returns:</text>
  <text x="474" y="234" fill="#eee" font-size="9" font-weight="600">cat "Whiskers"</text>
  <text x="474" y="248" fill="#aaa" font-size="8">id: 7</text>

  <!-- Step 2 -->
  <line x1="521" y1="250" x2="521" y2="275" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>

  <rect x="40" y="278" width="90" height="50" rx="8" fill="#1e1e1e" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="55" y="298" fill="#3b82f6" font-size="9" font-weight="700">REASON</text>
  <text x="46" y="318" fill="#aaa" font-size="8">"Ask which pet"</text>

  <line x1="130" y1="303" x2="148" y2="303" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>

  <rect x="152" y="278" width="115" height="50" rx="8" fill="#16a34a22" stroke="#16a34a" stroke-width="1.2"/>
  <text x="163" y="298" fill="#16a34a" font-size="9" font-weight="700">RESPOND</text>
  <text x="160" y="318" fill="#aaa" font-size="8">"For Whiskers?"</text>

  <line x1="267" y1="303" x2="285" y2="303" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>

  <rect x="289" y="278" width="145" height="50" rx="8" fill="#1e1e1e" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="304" y="298" fill="#8b5cf6" font-size="9" font-weight="700">OBSERVE</text>
  <text x="297" y="318" fill="#aaa" font-size="8">User says "yes"</text>

  <line x1="434" y1="303" x2="452" y2="303" stroke="#888" stroke-width="1" marker-end="url(#a2)"/>

  <rect x="456" y="278" width="145" height="50" rx="8" fill="#1e1e1e" stroke="#f97316" stroke-width="1.2"/>
  <text x="471" y="298" fill="#f97316" font-size="9" font-weight="700">ACT — Tool Call 2</text>
  <text x="464" y="318" fill="#f97316" font-size="8.5">add_visit(petId:7)</text>

  <!-- Final result -->
  <line x1="528" y1="328" x2="528" y2="355" stroke="#16a34a" stroke-width="1.2" marker-end="url(#a2g)"/>

  <rect x="40" y="358" width="700" height="45" rx="10" fill="#1e1e1e" stroke="#16a34a" stroke-width="1.5"/>
  <text x="60" y="380" fill="#16a34a" font-size="11" font-weight="700">FINAL RESPONSE</text>
  <text x="220" y="380" fill="#eee" font-size="10.5">"Visit booked for Whiskers on June 23 for a checkup!"</text>
  <text x="60" y="396" fill="#666" font-size="9">2 tool calls, 1 user interaction — all orchestrated autonomously by the AI. No hardcoded flow.</text>

  <!-- Key insight -->
  <rect x="40" y="418" width="700" height="48" rx="10" fill="#3b82f611" stroke="#3b82f6" stroke-width="1"/>
  <text x="60" y="440" fill="#3b82f6" font-size="10" font-weight="700">KEY INSIGHT</text>
  <text x="165" y="440" fill="#aaa" font-size="10">The AI figures out the steps itself — you don't program a conversation flow.</text>
  <text x="60" y="458" fill="#aaa" font-size="10">You give it tools + descriptions. It decides when, how, and in what order to use them.</text>
</svg>